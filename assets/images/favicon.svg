<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="4" fill="#0a0e1a"/>
  <!-- House walls -->
  <line x1="6" y1="28" x2="6" y2="16" stroke="#f0f0f0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="6" y1="28" x2="20" y2="28" stroke="#f0f0f0" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Roof -->
  <polyline points="3,17 13,6 23,17" stroke="#b8874a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Chimney -->
  <rect x="11" y="4" width="4" height="6" rx="1" fill="#b8874a"/>
  <!-- Door -->
  <rect x="10" y="20" width="6" height="8" rx="1" fill="#b8874a" opacity="0.9"/>
</svg>
