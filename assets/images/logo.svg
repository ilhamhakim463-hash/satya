<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 75" fill="none">
  <!-- House left wall (vertical) -->
  <line x1="8" y1="68" x2="8" y2="36" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round"/>
  <!-- House bottom wall (horizontal) -->
  <line x1="8" y1="68" x2="48" y2="68" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Roof left slope (gold-brown) -->
  <line x1="3" y1="38" x2="28" y2="9" stroke="#b8874a" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Roof right slope (gold-brown) -->
  <line x1="28" y1="9" x2="54" y2="38" stroke="#b8874a" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Chimney (gold-brown filled rectangle) -->
  <rect x="23" y="4" width="9" height="13" rx="1.5" fill="#b8874a"/>
  <!-- "Satya'" text in dark serif -->
  <text x="64" y="54"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="400"
    fill="#1a1a1a"
    letter-spacing="-0.5">Satya'</text>
  <!-- "Property" text in gold-brown serif -->
  <text x="148" y="54"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="30"
    font-weight="400"
    fill="#b8874a"
    letter-spacing="-0.5">Property</text>
</svg>
